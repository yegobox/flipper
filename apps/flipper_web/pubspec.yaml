name: flipper_web
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.648+1564


environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  riverpod: ^3.0.3
  http: ^1.2.1
  supabase_flutter: ^2.12.0
  cupertino_icons: ^1.0.8
  sqflite_common_ffi_web: ^1.0.1+1
  flipper_ui: ^1.0.3
  flipper_design_system: any
  flutter_localizations:
    sdk: flutter
  go_router: ^16.2.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  firebase_auth: ^6.1.0
  ditto_live: ^5.0.1
  flipper_accounting: any
  flipper_models: any
  permission_handler: ^12.0.1
  wolt_modal_sheet: 0.11.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.4
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: 10.3.7
  uuid: ^4.5.1
  path_provider: ^2.1.5
  riverpod_annotation: ^3.0.3
  sqflite_common: ^2.5.4+6
  supabase_models: any
  shared_preferences: ^2.5.3
dependency_overrides:
  archive: ^4.0.9
  sqlite3: ^3.3.1
  # Wasm-safe replacement: upstream flutter_keyboard_visibility_web 2.0.0 imports
  # dart:html, which dart2wasm cannot compile. See open-sources package.
  flutter_keyboard_visibility_web:
    path: ../../open-sources/flutter_keyboard_visibility_web
  # Wasm-safe replacement: upstream ua_client_hints 1.7.0 (pulled transitively)
  # imports dart:html, breaking `flutter build web --wasm`. This fork ports the
  # web impl to package:web. See open-sources/ua_client_hints.
  ua_client_hints:
    path: ../../open-sources/ua_client_hints

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^3.0.3
  build_runner: ^2.10.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/

name: Flipper - CI/CD - Windows & Android & Google Play

on:
  # Enable manual run
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane"
        required: true
        default: "internal"
        type: choice
        options:
          - beta
          - promote_to_production
          - production
  push:
    branches:
      - 'feature-*'
      - 'hotfix-*'
      - 'bugfix-*'
      - main
      - dev
      - re-design
      - v5
env:
  URL: ${{ secrets.DB_URL }}
  PASSWORD: ${{ secrets.DB_PASSWORD }}
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
  FLUTTER_VERSION: "3.44.6" # flutter_gemma >=1.0.0 requires Dart SDK >=3.12.0
  # SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} # Securely store this
  IS_TEST_ENV: true

jobs:
  unit-testing:
    name: Unit Testing
    # if: false
    runs-on: ubuntu-latest
    env:
      FLUTTER_TEST_CI: true
    # needs: [supabase-init] # Requires Supabase to be initialized
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          persist-credentials: true

      - name: Force submodule update
        run: git submodule update --init --force --recursive

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
      - run: |
          git submodule update --init
      - name: Setup melos
        run: dart pub global activate melos 7.3.0

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap melos
        run: |
          dart run melos bootstrap
          dart run melos run generate:icons

      - name: Configure Missing files
        shell: bash
        run: |
          echo "$INDEX" >> apps/flipper/web/index.html
          echo "$CONFIGDART" >> packages/flipper_login/lib/config.dart
          echo "$SECRETS" >> packages/flipper_models/lib/secrets.dart
          echo "$SECRETS" >> apps/flipper_web/lib/core/secrets.dart
          echo "$FIREBASEOPTIONS" >> apps/flipper/lib/firebase_options.dart
          echo "$FIREBASEOPTIONS" >> packages/flipper_models/lib/firebase_options.dart
          echo "$AMPLIFY_CONFIG" >> apps/flipper/lib/amplifyconfiguration.dart
          echo "$AMPLIFY_TEAM_PROVIDER" >> apps/flipper/amplify/team-provider-info.json
          git config --global core.autocrlf false
          echo "$AMPLIFY_TEAM_PROVIDER" >> apps/flipper/amplify/team-provider-info.json
        env:
          INDEX: ${{ secrets.INDEX }}
          CONFIGDART: ${{ secrets.CONFIGDART }}
          SECRETS: ${{ secrets.SECRETS }}
          FIREBASEOPTIONS: ${{ secrets.FIREBASEOPTIONS }}
          AMPLIFY_CONFIG: ${{ secrets.AMPLIFY_CONFIG }}
          AMPLIFY_TEAM_PROVIDER: ${{ secrets.AMPLIFY_TEAM_PROVIDER }}

      - name: Install LCOV
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage
        run: dart run melos run test:ci
#  # dart run realm install
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/flipper_dashboard/coverage/lcov.info,apps/flipper_web/coverage/lcov.info
  build_web_deploy_firebase:
    runs-on: ubuntu-latest
    # needs: [unit-testing]
    # if: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          persist-credentials: true

      - name: Force submodule update
        run: git submodule update --init --force --recursive
      
      # Setup Flutter (No changes needed here)
      - name: Clone Flutter repository with stable channel
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }} # Consider using a more recent stable Flutter version if possible/needed
          channel: stable
      - run: flutter doctor -v

      # Git initialization and submodule handling (No changes needed here)
      - name: Initialize Git repository
        run: git init 
      - name: Submodule init and update
        run: git submodule update --init
        
      # Configure secrets (No changes needed here)
      - name: Configure Missing files
        shell: bash
        run: |
          echo "$CONFIGDART" >> packages/flipper_login/lib/config.dart
          echo "$SECRETS" >> packages/flipper_models/lib/secrets.dart
          echo "$SECRETS" >> apps/flipper_web/lib/core/secrets.dart
          echo "$FIREBASEOPTIONS" >> apps/flipper/lib/firebase_options.dart
          echo "$FIREBASEOPTIONS" >> packages/flipper_models/lib/firebase_options.dart
          echo "$AMPLIFY_CONFIG" >> apps/flipper/lib/amplifyconfiguration.dart
          echo "$AMPLIFY_TEAM_PROVIDER" >> apps/flipper/amplify/team-provider-info.json
        env:
          INDEX: ${{ secrets.INDEX }}
          CONFIGDART: ${{ secrets.CONFIGDART }}
          SECRETS: ${{ secrets.SECRETS }}
          FIREBASEOPTIONS: ${{ secrets.FIREBASEOPTIONS }}
          AMPLIFY_CONFIG: ${{ secrets.AMPLIFY_CONFIG }} 
          AMPLIFY_TEAM_PROVIDER: ${{ secrets.AMPLIFY_TEAM_PROVIDER }}
          
      - name: Set up Node.js for Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify Node.js v20.x LTS

      - name: Setup melos
        run: dart pub global activate melos 7.3.0

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap dependencies
        run: dart run melos bootstrap

      - name: Build Flipper Web app
        # dart2js only (no --wasm). Dual-target WASM builds serve main.dart.mjs
        # to Chrome; dart2wasm + Ditto DQL read-after-write on cold start breaks
        # replication bootstrap (20s timeout → empty COA seed). Safari fell back
        # to main.dart.js and worked. Re-enable --wasm when bootstrap is WASM-safe.
        # 
        run: |
          cd apps/flipper_web
          flutter build web --release
          test -f build/web/main.dart.js
          # Drop dart2wasm app artifacts so Firebase cannot serve stale main.dart.mjs
          # to Chrome (service worker cache + leftover files from prior WASM deploys).
          rm -f build/web/main.dart.mjs build/web/main.dart.wasm

      - name: Target production hosting site on main
        if: github.ref == 'refs/heads/main'
        working-directory: apps/flipper_web
        run: |
          # Live (production) deploys must hit the default `yegobox-2ee43` site,
          # which owns yegobox-2ee43.web.app AND the connected custom domain
          # flipper.yegobox.com. Non-main builds leave firebase.json untouched
          # and keep deploying preview channels to the `flipper-uat` site.
          tmp=$(mktemp)
          jq '.hosting.site = "yegobox-2ee43"' firebase.json > "$tmp" && mv "$tmp" firebase.json
          echo "Hosting site set to: $(jq -r '.hosting.site' firebase.json)"

      - name: Deploy Flipper Web app to Firebase Hosting
        id: deploy_flipper_web
        uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          entryPoint: apps/flipper_web
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YEGOBOX_2EE43 }}
          # On main -> deploy to the live channel (serves yegobox-2ee43.web.app
          # AND the connected custom domain flipper.yegobox.com). Other branches
          # get an ephemeral preview channel for QA.
          channelId: ${{ github.ref == 'refs/heads/main' && 'live' || format('pr-{0}', github.event.commits.id) }}
          projectId: yegobox-2ee43
      - name: Echo Flipper Web URL
        # The live-channel deploy above publishes to the default `yegobox-2ee43`
        # Hosting site, which owns BOTH custom domains flipper.yegobox.com AND
        # useflipper.com (see Firebase Console > Hosting). So this single deploy
        # already serves useflipper.com — there is no separate `useflipper` site
        # to target (a stray `jq .hosting.site = "useflipper"` + deploy block was
        # removed because it failed with: could not find site "useflipper").
        run: echo "Flipper Web app (serves flipper.yegobox.com + useflipper.com) deployed to ${{ steps.deploy_flipper_web.outputs.urls }}"
  integration-testing-windows:
    name: "Integration Testing Windows"
    runs-on: windows-2022
    if: false  # skip for now as it is flaky
    needs: [build_web_deploy_firebase] # Requires Supabase to be initialized
    steps:
      - name: Export pub environment variable on Windows
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "PUB_CACHE=$LOCALAPPDATA\\Pub\\Cache" >> $GITHUB_ENV
          fi
        shell: bash
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          persist-credentials: true

      - name: Force submodule update
        run: git submodule update --init --force --recursive
      - name: Clone Flutter repository with stable channel
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter doctor -v

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup melos
        run: dart pub global activate melos 7.3.0

      - name: Add pub cache to PATH (Windows)
        if: runner.os == 'Windows'
        run: Add-Content -Path $env:GITHUB_PATH -Value "${PUB_CACHE}/bin"
        shell: pwsh

      - name: Add pub cache to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
        shell: bash

      - name: Initialize submodules and bootstrap melos
        run: |
          git submodule update --init
          dart run melos bootstrap
        shell: bash

      - name: Configure Missing files
        shell: bash
        run: |
          echo "$INDEX" >> apps/flipper/web/index.html
          echo "$CONFIGDART" >> packages/flipper_login/lib/config.dart
          echo "$SECRETS" >> packages/flipper_models/lib/secrets.dart
          echo "$SECRETS" >> apps/flipper_web/lib/core/secrets.dart
          echo "$FIREBASEOPTIONS" >> apps/flipper/lib/firebase_options.dart
          echo "$FIREBASEOPTIONS" >> packages/flipper_models/lib/firebase_options.dart
          echo "$AMPLIFY_CONFIG" >> apps/flipper/lib/amplifyconfiguration.dart
          echo "$AMPLIFY_TEAM_PROVIDER" >> apps/flipper/amplify/team-provider-info.json
        env:
          INDEX: ${{ secrets.INDEX }}
          CONFIGDART: ${{ secrets.CONFIGDART }}
          SECRETS: ${{ secrets.SECRETS }}
          FIREBASEOPTIONS: ${{ secrets.FIREBASEOPTIONS }}
          AMPLIFY_CONFIG: ${{ secrets.AMPLIFY_CONFIG }}
          AMPLIFY_TEAM_PROVIDER: ${{ secrets.AMPLIFY_TEAM_PROVIDER }}

      # - name: Prefetch dittoffi.dll
      #   shell: pwsh
      #   run: ./scripts/ci/prefetch-dittoffi.ps1

      - name: Cache pdfium archive
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pdfium
          key: pdfium-chromium-5200-win-x64-${{ hashFiles('apps/flipper/pubspec.lock', 'pubspec.lock') }}
          restore-keys: |
            pdfium-chromium-5200-win-x64-

      - name: Prefetch pdfium for printing plugin
        shell: pwsh
        run: |
          Set-Location apps/flipper
          flutter pub get
          Set-Location ../..
          ./scripts/ci/prefetch-pdfium.ps1
          ./scripts/ci/patch-windows-plugins.ps1

      - run: |
          cd apps/flipper
          flutter test --dart-define=FLUTTER_TEST_ENV=true -d windows integration_test/smoke_windows_test.dart

  build-and-release-windows-debug:
    name: "Build windows app-debug"
    if: github.ref != 'refs/heads/main' # Skip on merge to main; prod build runs instead
    runs-on: windows-latest
    # needs: [unit-testing,build_web_deploy_firebase] # Requires Supabase to be initialized
    # 
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }} # Use a token with repo scope for releases
          persist-credentials: true

      - name: Force submodule update
        run: git submodule update --init --force --recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup melos
        run: dart pub global activate melos 7.3.0

      - name: Add pub cache to PATH (Windows)
        if: runner.os == 'Windows'
        run: Add-Content -Path $env:GITHUB_PATH -Value "${PUB_CACHE}/bin"
        shell: pwsh

      - name: Add pub cache to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
        shell: bash

      - name: Get Dependencies
        run: |
          dart run melos bootstrap
        shell: bash

      - name: Configure Missing files
        shell: bash
        run: |
          echo "$INDEX" >> apps/flipper/web/index.html
          echo "$CONFIGDART" >> packages/flipper_login/lib/config.dart
          echo "$SECRETS" >> packages/flipper_models/lib/secrets.dart
          echo "$SECRETS" >> apps/flipper_web/lib/core/secrets.dart
          echo "$FIREBASEOPTIONS" >> apps/flipper/lib/firebase_options.dart
          echo "$FIREBASEOPTIONS" >> packages/flipper_models/lib/firebase_options.dart
          echo "$AMPLIFY_CONFIG" >> apps/flipper/lib/amplifyconfiguration.dart
          echo "$AMPLIFY_TEAM_PROVIDER" >> apps/flipper/amplify/team-provider-info.json
        env:
          INDEX: ${{ secrets.INDEX }}
          CONFIGDART: ${{ secrets.CONFIGDART }}
          SECRETS: ${{ secrets.SECRETS }}
          FIREBASEOPTIONS: ${{ secrets.FIREBASEOPTIONS }}
          AMPLIFY_CONFIG: ${{ secrets.AMPLIFY_CONFIG }}
          AMPLIFY_TEAM_PROVIDER: ${{ secrets.AMPLIFY_TEAM_PROVIDER }}

      # - name: Prefetch dittoffi.dll
      #   shell: pwsh
      #   run: ./scripts/ci/prefetch-dittoffi.ps1

      - name: Cache pdfium archive
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pdfium
          key: pdfium-chromium-5200-win-x64-${{ hashFiles('apps/flipper/pubspec.lock', 'pubspec.lock') }}
          restore-keys: |
            pdfium-chromium-5200-win-x64-

      - name: Prefetch pdfium for printing plugin
        shell: pwsh
        run: ./scripts/ci/prefetch-pdfium.ps1

      - name: Build and Package
        shell: pwsh
        run: |
          Set-Location apps/flipper
          flutter clean
          flutter pub get
          Set-Location ../..
          ./scripts/ci/prefetch-pdfium.ps1
          ./scripts/ci/patch-windows-plugins.ps1
          Set-Location apps/flipper
          flutter build windows -v
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Set-Location ../..
          ./scripts/ci/bundle-native-assets.ps1
          Set-Location apps/flipper
          dart run msix:create -v --build-windows false --install-certificate false --signtool-options "/td SHA256"

      - name: Extract msix_version
        id: get_version
        shell: powershell
        run: |
          $MSIX_VERSION = (Get-Content -Path "apps/flipper/pubspec.yaml" -Raw) -match 'msix_config:\s*([\s\S]*?)\bmsix_version:\s*(\d+\.\d+\.\d+\.\d+)\b' | ForEach-Object { if ($matches.Count -ge 2) { $matches[2] } else { Write-Output "No msix_version found"; exit 1 } }; echo "version=$MSIX_VERSION" >> $env:GITHUB_OUTPUT

      - name: Create Debug Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/flipper/build/windows/x64/runner/Release/flipper_rw.msix
          tag_name: v${{ steps.get_version.outputs.version }}_windows_debug
          name: Windows Debug Release ${{ steps.get_version.outputs.version }}
          draft: false
          body: |
            Debug Release for QA
        env:
          GITHUB_TOKEN: ${{ github.token }} 

  build-and-release-windows-prod:

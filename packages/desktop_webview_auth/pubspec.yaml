name: desktop_webview_auth
description: Dart-only fork for Flipper — no Windows/macOS/Linux native plugin (QR login on desktop).
version: 0.0.16
publish_to: none

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  crypto: ^3.0.3
  flutter:
    sdk: flutter
  http: ^1.0.0
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.4

flutter:
  plugin:
    platforms:
      web:
        pluginClass: DesktopWebviewAuthWeb
        fileName: desktop_webview_auth_web.dart

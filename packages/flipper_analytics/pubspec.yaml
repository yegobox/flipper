name: flipper_analytics
description: Shared PostHog analytics for Flipper apps.
version: 1.0.0-dev
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.0.0
  http: ^1.3.0
  path_provider: ^2.1.5
  posthog_flutter: ^5.30.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1

dependency_overrides:
  xml: ^7.0.1
  smithy:
    path: ../../open-sources/smithy
  smithy_aws:
    path: ../../open-sources/smithy_aws
  jni: ^0.14.2
  archive: ^4.0.9
  sqlite3: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: false

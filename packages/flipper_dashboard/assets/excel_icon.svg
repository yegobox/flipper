<svg width="200" height="260" viewBox="0 0 200 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Excel file icon</title>
  <desc>A Microsoft Excel-style file icon with green header and spreadsheet grid</desc>

  <!-- File body -->
  <rect x="10" y="10" width="180" height="240" rx="8" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Folded corner -->
  <polygon points="140,10 190,60 140,60" fill="#e0e0e0"/>
  <polyline points="140,10 140,60 190,60" fill="none" stroke="#c0c0c0" stroke-width="1"/>

  <!-- Green header bar -->
  <rect x="10" y="75" width="180" height="36" fill="#1D6F42"/>

  <!-- "X" Excel letter -->
  <text x="28" y="101" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">X</text>

  <!-- Header label -->
  <text x="52" y="99" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff">.xlsx</text>

  <!-- Row header shading -->
  <rect x="18" y="122" width="36" height="118" fill="#f5f5f5"/>

  <!-- Column header shading -->
  <rect x="18" y="122" width="164" height="12" fill="#f5f5f5"/>

  <!-- Grid lines horizontal -->
  <line x1="18" y1="134" x2="182" y2="134" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="148" x2="182" y2="148" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="162" x2="182" y2="162" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="176" x2="182" y2="176" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="190" x2="182" y2="190" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="204" x2="182" y2="204" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="218" x2="182" y2="218" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="18" y1="232" x2="182" y2="232" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="54" y1="122" x2="54" y2="240" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="108" y1="122" x2="108" y2="240" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="146" y1="122" x2="146" y2="240" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Column letters -->
  <text x="81" y="132" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">A</text>
  <text x="127" y="132" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">B</text>
  <text x="164" y="132" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">C</text>

  <!-- Row numbers -->
  <text x="36" y="145" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">1</text>
  <text x="36" y="159" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">2</text>
  <text x="36" y="173" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">3</text>
  <text x="36" y="187" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">4</text>
  <text x="36" y="201" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">5</text>
  <text x="36" y="215" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">6</text>
  <text x="36" y="229" font-family="Arial, sans-serif" font-size="8" fill="#888" text-anchor="middle">7</text>

  <!-- Sample data bars -->
  <rect x="58" y="137" width="24" height="7" rx="2" fill="#1D6F42" opacity="0.7"/>
  <rect x="58" y="151" width="32" height="7" rx="2" fill="#1D6F42" opacity="0.5"/>
  <rect x="58" y="165" width="18" height="7" rx="2" fill="#1D6F42" opacity="0.6"/>
  <rect x="58" y="179" width="28" height="7" rx="2" fill="#1D6F42" opacity="0.4"/>
  <rect x="58" y="193" width="14" height="7" rx="2" fill="#1D6F42" opacity="0.7"/>

  <rect x="112" y="137" width="26" height="7" rx="2" fill="#2196a0" opacity="0.5"/>
  <rect x="112" y="151" width="16" height="7" rx="2" fill="#2196a0" opacity="0.4"/>
  <rect x="112" y="165" width="30" height="7" rx="2" fill="#2196a0" opacity="0.6"/>
  <rect x="112" y="179" width="20" height="7" rx="2" fill="#2196a0" opacity="0.5"/>
  <rect x="112" y="193" width="24" height="7" rx="2" fill="#2196a0" opacity="0.4"/>

  <!-- Sheet tabs -->
  <rect x="10" y="242" width="52" height="8" fill="#1D6F42"/>
  <text x="36" y="249" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">Sheet1</text>
  <rect x="64" y="242" width="52" height="8" fill="#f0f0f0"/>
  <text x="90" y="249" font-family="Arial, sans-serif" font-size="7" fill="#888" text-anchor="middle">Sheet2</text>
</svg>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flipper · Checkout Error</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="onboarding/styles.css" />
  <link rel="stylesheet" href="mpos/mpos.css" />
  <link rel="stylesheet" href="error_checkout/error.css" />

  <style>
    #boot {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
      background: radial-gradient(120% 80% at 50% 18%, #FFFFFF 0%, #F4F6FB 55%, #EDF2FB 100%);
      font-family: 'Geist', system-ui, sans-serif;
      transition: opacity .45s ease, visibility .45s ease;
    }
    #boot.is-hidden { opacity: 0; visibility: hidden; }
    .boot-mark { position: relative; width: 96px; height: 96px; }
    .boot-ring { position: absolute; inset: -14px; animation: bootspin 1s linear infinite; }
    @keyframes bootspin { to { transform: rotate(360deg); } }
    .boot-word { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .boot-word b { font-size: 22px; font-weight: 700; letter-spacing: -.02em; color: #0B1220; }
    .boot-dots { display: flex; gap: 6px; }
    .boot-dots i { width: 7px; height: 7px; border-radius: 50%; background: #C5CFE0; animation: bootpulse 1.2s ease-in-out infinite; }
    .boot-dots i:nth-child(2) { animation-delay: .18s; }
    .boot-dots i:nth-child(3) { animation-delay: .36s; }
    @keyframes bootpulse { 0%,100% { transform: scale(.7); opacity: .4; } 40% { transform: scale(1); opacity: 1; background: #2563EB; } }
    @media (prefers-reduced-motion: reduce) { .boot-ring, .boot-dots i { animation: none; } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="boot">
    <div class="boot-mark">
      <svg width="96" height="96" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="bg" x1="6" y1="8" x2="42" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22D3EE" /><stop offset="0.5" stop-color="#2563EB" /><stop offset="1" stop-color="#4F46E5" />
          </linearGradient>
        </defs>
        <path d="M24 7.5a16.5 16.5 0 1 1-11.6 4.8" stroke="url(#bg)" stroke-width="8.16" stroke-linecap="round" fill="none" />
        <path d="M24 16.5a7.5 7.5 0 1 0 5.3 2.2" stroke="url(#bg)" stroke-width="6.36" stroke-linecap="round" fill="none" opacity="0.55" />
      </svg>
      <svg class="boot-ring" width="124" height="124" viewBox="0 0 124 124" fill="none" aria-hidden="true">
        <circle cx="62" cy="62" r="58" stroke="#E1E8F4" stroke-width="4" />
        <circle cx="62" cy="62" r="58" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-dasharray="92 280" />
      </svg>
    </div>
    <div class="boot-word">
      <b>Flipper</b>
      <div class="boot-dots"><i></i><i></i><i></i></div>
    </div>
  </div>

  <div id="root"></div>

  <script type="text/babel" src="onboarding/icons.jsx"></script>
  <script type="text/babel" src="onboarding/frame.jsx"></script>
  <script type="text/babel" src="error_checkout/tweaks-panel.jsx"></script>
  <script type="text/babel" src="error_checkout/error-app.jsx"></script>
</body>
</html>

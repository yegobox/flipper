name: flipper
repository: https://github.com/yegobox/flipper
packages:
  - open-sources/**
  - open-sources/**/**
  - packages/**
  - packages/**/**
  - apps/**
  - apps/**/*

ignore:
  - "*odm*"
command:
  version:
    linkToCommits: true
    branch: dev
    workspaceChangelog: true

# Global dependency overrides for consistent versions across packages
dependency_overrides:
  archive: ^3.6.1
  flutter_native_splash: ^2.3.2
  analyzer: ^9.0.0
  source_gen: ">=3.1.0 <5.0.0"  # Override to allow compatibility with json_serializable
  image: ^4.1.0
  record_linux: 1.3.0
  record_web: 1.3.0
  # path_provider_android 2.3.0+ depends on jni ^1.0 and generated code incompatible with jni 0.14.x/0.15.x
  path_provider_android: ">=2.2.5 <2.3.0"
  # Align with sentry/receipt; do not use jni ^1.0 until the whole workspace migrates together.
  jni: ^0.14.2

scripts:
  generate:icons:
    exec: flutter pub run flutter_launcher_icons:main
    packageFilters:
      scope: "flipper_auth"
    description: Generate app icons for flipper_auth
  
  generate:icons:ai:
    exec: flutter pub run flutter_launcher_icons:main
    packageFilters:
      scope: "flipper_ai"
    description: Generate app icons for flipper_ai
  
  test:ai:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true
    packageFilters:
      scope: "flipper_ai"
    description: Run tests for flipper_ai
  
  test:ai_feature:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true
    packageFilters:
      scope: "flipper_ai_feature"
    description: Run tests for flipper_ai_feature package
  
  test:dashboard:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope: "flipper_dashboard"
    description: Run tests for flipper_dashboard
  test:auth:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope: "flipper_auth"
    description: Run tests for flipper_auth
  test:flipper_web:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope: "flipper_web"
    description: Run tests for flipper_web
  test:supabase_models:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope: "supabase_models"
    description: Run tests for supabase_models (including stock recount tests)
  test:stock_recount:
    exec: flutter test test/stock_recount_test.dart test/stock_recount_item_test.dart --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope: "supabase_models"
    description: Run only stock recount tests in supabase_models
  test:specific:
    exec: flutter test --coverage  --dart-define=FLUTTER_TEST_ENV=true 
    packageFilters:
      scope:
        - flipper_dashboard
        - flipper_auth
    description: Run tests for flipper_dashboard and flipper_auth
  test:ci:
    run: |
      dart run melos run test:dashboard
      dart run melos run test:auth
      dart run melos run test:flipper_web
      dart run melos run test:supabase_models
      dart run melos run test:ai_feature

    description: Run tests for dashboard, auth, web and supabase_models in CI/CD
  get_deps:
    run: dart run melos exec -- flutter pub deps
    description: List sub dependencies
  flipper:
    run: dart run melos exec --scope="*flipper_data_table*" -- flutter packages pub publish -f
  lint:all:
    run: dart run melos run analyze && dart run melos run format
    description: Run all static analysis checks.
  test:all_unit_tests:
    exec: flutter test
    no-select: true
    description: Run all unit testsAdditionally, you can incorporate commands for analysis and code coverage. Melos offers a GUI interface for seamless execution without terminal input.
  unit_test:
    run: |
      # dart run realm install
      dart run melos exec --dir-exists="test" --fail-fast -- flutter test --dart-define=FLUTTER_TEST_ENV=true  --no-pub
    description: Run all Flutter tests in this project.
  unit_test_and_coverage:
    description: Merge all packages coverage tracefiles and filter out generated files with correct paths.
    run: |
      dart run melos exec rm -rf coverage
      dart run melos run unit_test
      dart run melos exec -c 1 --file-exists=coverage/lcov.info -- coverde  filter --input ./coverage/lcov.info --output MELOS_ROOT_PATH/coverage/filtered.lcov.info --filters \.g\.dart --paths-parent MELOS_PACKAGE_PATH --mode a
      coverde value -i coverage/filtered.lcov.info > MELOS_ROOT_PATH/coverage/result.txt
      genhtml -o MELOS_ROOT_PATH/coverage/html MELOS_ROOT_PATH/coverage/filtered.lcov.info 
  analyze:
    run: |
      dart run melos exec -c 5 -- \
        dart analyze . --fatal-infos
    description: |
      Run `dart analyze` in all packages.
       - Note: you can also rely on your IDEs Dart Analysis / Issues window.

  firebase:emulator:
    run: |
      cd .github/workflows/scripts && ./start-firebase-emulator.sh
    description: |
      Start the Firebase emulator suite. Used by Functions, Firestore, Auth and Storage
      integration testing.
       - Requires Node.js and NPM installed.

  format:
    run: dart pub global run flutter_plugin_tools format
    description: |
      Build a specific example app for Android.
       - Requires `flutter_plugin_tools` (`pub global activate flutter_plugin_tools`).
       - Requires `clang-format` (can be installed via Brew on macOS).

  build:all:
    run: |
      dart run melos run build:example_ios_pub --no-select && \
      dart run melos run build:example_android_pub --no-select && \
      dart run melos run build:example_macos --no-select && \
      dart run melos bootstrap
    description: Build all example apps.

  build:example_android:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter build apk --no-pub"
    description: Build a specific example app for Android.
    select-package:
      dir-exists:
        - android
      scope: "*example*"

  build:example_android_pub:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter build apk"
    description: Build a specific example app for Android.
    select-package:
      dir-exists:
        - android
      scope: "*example*"

  build:example_ios:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter build ios --no-codesign --no-pub"
    description: Build a specific example app for iOS.
    select-package:
      dir-exists:
        - ios
      scope: "*example*"

  build:example_ios_pub:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter build ios --no-codesign"
    description: Build a specific example app for iOS.
    select-package:
      dir-exists:
        - ios
      scope: "*example*"

  build:example_macos:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter build macos --no-pub"
    description: |
      Build a specific example app for macOS.
    select-package:
      dir-exists:
        - macos
      scope: "*example*"

  test:all:
    run: |
      dart run melos run test --no-select && \
      dart run melos run test:web --no-select && \
      dart run melos run test:e2e --no-select
    description: |
      Run all tests available.

  test:
    run: |
      dart run melos exec -c 6 --fail-fast -- \
        "flutter test --no-pub"
    description: Run `flutter test` for a specific package.
    select-package:
      dir-exists:
        - test
      ignore:
        - "*web*"
        - "*odm*"
        - "*example*"

  test:web:
    run: |
      dart run melos exec -c 1 --fail-fast -- \
        "flutter test --no-pub --platform=chrome"
    description: Run `flutter test --platform=chrome` for a specific '*web' package.
    select-package:
      dir-exists:
        - test
      scope: "*web*"

  test:e2e:
    run: |
      dart run melos exec -c 1 --fail-fast -- \
        "flutter drive --no-pub --target=./test_driver/driver_e2e.dart"
    description: |
      Run all e2e tests.
    select-package:
      dir-exists:
        - test_driver
      scope: "*tests*"

  clean:deep:
    run: git clean -x -d -f -q
    description: Clean things very deeply, can be used to establish "pristine checkout" status.

  qualitycheck:
    run: |
      dart run melos run clean:deep && \
      dart run melos clean && \
      dart run melos bootstrap && \
      dart run melos run lint:all && \
      dart run melos run build:all && \
      dart run melos run test:all
    description: Run all targets generally expected in CI for a full local quality check.

  odm:test:
    run: |
      dart run melos run odm:test:dart &&
      dart run melos run odm:test:flutter
    description: Run all tests for the ODM.

  odm:test:dart:
    run: |
      dart run melos exec -- \
        "dart test"
    description: Run Dart tests for the ODM.
    select-package:
      dir-exists: "test"
      depends-on: "test"
      scope: "*odm*"

  odm:test:flutter:
    run: |
      dart run melos exec -- \
        "flutter test"
    description: Run Flutter tests for the ODM.
    select-package:
      dir-exists: "test"
      no-depends-on: "test"
      scope: "*odm*"

  odm:example_build_runner:build:
    run: |
      dart run melos exec -- \
        "flutter pub run build_runner build --delete-conflicting-outputs"
    description: Run a build_runner build in the ODM example app.
    select-package:
      scope: "*odm_example*"

  odm:generator_test_build_runner:build:
    run: |
      dart run melos exec -c 1 -- \
        "dart pub get && flutter pub run build_runner build --delete-conflicting-outputs"
    description: Run a build_runner build generator test.
    select-package:
      scope:
        - "*odm_generator_integration*"

  odm:example_build_runner:watch:
    run: |
      dart run melos exec -c 5 -- \
        "flutter pub run build_runner watch --delete-conflicting-outputs"
    description: Run build_runner watch in the ODM example app.
    select-package:
      scope: "*odm_example*"
  upgrade_dependencies:
    run: |
      dart run melos exec -c 6 -- \
        "flutter pub upgrade"

  description: Upgrade all dependencies.

  # Additional cleanup lifecycle script, executed when `melos clean` is run.
  postclean: >
    dart run melos exec -c 6 -- "flutter clean"
